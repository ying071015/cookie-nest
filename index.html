<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍪=⩌⩊⩌=莹.</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;
  background:#fff0f5;
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
  height:100vh;
}
#header{
  background:rgba(255,255,255,0.97);
  padding:10px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #ffd6e7;
  flex-shrink:0;
}
#ai-avatar-btn{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#ffb6c1,#ff69b4);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;overflow:hidden;flex-shrink:0;
}
#ai-avatar-btn img{width:100%;height:100%;object-fit:cover}
.hinfo{flex:1}
.hname{font-size:15px;font-weight:600;color:#333}
.hsub{font-size:11px;color:#ff69b4}
#set-btn{
  width:32px;height:32px;border-radius:50%;
  background:#fff0f5;border:1px solid #ffd6e7;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;flex-shrink:0;
}
#api-bar{
  background:#ffe4ef;
  border-bottom:1px solid #ffd6e7;
  padding:10px 14px;
  font-size:12px;color:#ff69b4;
  text-align:center;
  flex-shrink:0;
}
#api-bar input{
  width:100%;margin-top:6px;
  padding:7px 10px;
  border:1px solid #ffd6e7;border-radius:8px;
  font-size:13px;outline:none;color:#333;
}
#api-bar button{
  margin-top:6px;padding:7px 18px;
  background:linear-gradient(135deg,#ff9eb5,#ff69b4);
  color:white;border:none;border-radius:8px;
  cursor:pointer;font-size:13px;
}
#chat{
  flex:1;
  overflow-y:auto;
  padding:12px 10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background-size:cover;
  background-position:center;
}
.ts{text-align:center;font-size:11px;color:#999;margin:2px 0}
.msg{display:flex;align-items:flex-end;gap:8px}
.msg.u{flex-direction:row-reverse}
.av{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  overflow:hidden;
  background:linear-gradient(135deg,#c8a2c8,#9b59b6);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.av img{width:100%;height:100%;object-fit:cover}
.mc{max-width:70%}
.mn{font-size:11px;color:#bbb;margin-bottom:2px;padding-left:2px}
.msg.u .mn{text-align:right;padding-right:2px;padding-left:0}
.bub{
  padding:9px 13px;border-radius:18px;
  font-size:14px;line-height:1.5;word-break:break-word;
}
.msg.ai .bub{
  background:white;color:#333;
  border-bottom-left-radius:4px;
  box-shadow:0 1px 4px rgba(255,105,180,0.12);
}
.msg.u .bub{
  background:linear-gradient(135deg,#ff9eb5,#ff69b4);
  color:white;border-bottom-right-radius:4px;
}
.bub img{max-width:180px;border-radius:10px;display:block}
.rs{font-size:10px;color:#ff69b4;text-align:right;margin-top:2px}
.tdots{display:flex;gap:4px;align-items:center;height:14px}
.tdots span{
  width:6px;height:6px;border-radius:50%;
  background:#ffb6c1;animation:bo 1.2s infinite;
}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
#sticker-panel{
  display:none;
  background:white;
  border-top:1px solid #ffd6e7;
  padding:8px;
  flex-wrap:wrap;
  gap:6px;
  max-height:180px;
  overflow-y:auto;
  flex-shrink:0;
}
#sticker-panel.open{display:flex}
.st{
  width:58px;height:58px;border-radius:8px;
  overflow:hidden;cursor:pointer;border:2px solid transparent;flex-shrink:0;
}
.st img{width:100%;height:100%;object-fit:cover}
.st-add{
  width:58px;height:58px;border-radius:8px;
  background:#fff0f5;border:2px dashed #ffd6e7;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;flex-shrink:0;
}
#toolbar{
  background:rgba(255,255,255,0.97);
  border-top:1px solid #ffd6e7;
  padding:5px 10px;
  display:flex;gap:6px;align-items:center;
  flex-shrink:0;
}
.tb{
  width:32px;height:32px;border-radius:50%;
  background:#fff0f5;border:1px solid #ffd6e7;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;flex-shrink:0;
}
#input-row{
  background:rgba(255,255,255,0.97);
  border-top:1px solid #ffd6e7;
  padding:8px 10px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
#msgbox{
  flex:1;background:#fff0f5;
  border:1px solid #ffd6e7;border-radius:20px;
  padding:9px 14px;font-size:14px;outline:none;
  color:#333;max-height:80px;overflow-y:auto;
  resize:none;line-height:1.4;
}
#msgbox::placeholder{color:#ffb6c1}
#send{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#ff9eb5,#ff69b4);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
#overlay{
  display:none;position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.45);z-index:200;
  align-items:flex-end;
}
#overlay.open{display:flex}
#sbox{
  background:white;border-radius:20px 20px 0 0;
  padding:18px;width:100%;max-width:480px;margin:0 auto;
}
#sbox h3{font-size:15px;font-weight:600;color:#333;margin-bottom:12px;text-align:center}
.si{
  display:flex;align-items:center;
  padding:11px 0;border-bottom:1px solid #fff0f5;
  gap:12px;cursor:pointer;
}
.si-ic{font-size:19px;width:26px;text-align:center}
.si-tx{flex:1;font-size:14px;color:#333}
#sclose{
  width:100%;padding:11px;
  background:#fff0f5;border:none;
  border-radius:12px;font-size:14px;
  color:#ff69b4;cursor:pointer;margin-top:10px;
}
</style>
</head>
<body>

<div id="header">
  <div id="ai-avatar-btn" onclick="chAv('ai')">
    <span id="ai-em">🍪</span>
    <img id="ai-im" src="" style="display:none">
  </div>
  <div class="hinfo">
    <div class="hname">🍪=⩌⩊⩌=莹.</div>
    <div class="hsub">与 Cookie の 私密空间 · 在线</div>
  </div>
  <div id="set-btn" onclick="showSet()">⚙️</div>
</div>

<div id="api-bar">
  🔑 请输入 Claude API Key 才能聊天～
  <input type="password" id="api-in" placeholder="sk-ant-api03-...">
  <button onclick="saveKey()">保存</button>
</div>

<div id="chat"></div>

<div id="sticker-panel">
  <div class="st-add" onclick="document.getElementById('st-up').click()">＋</div>
</div>

<div id="toolbar">
  <div class="tb" onclick="toggleSt()" title="表情包">😄</div>
  <div class="tb" onclick="document.getElementById('img-up').click()" title="发图片">🖼️</div>
  <div class="tb" onclick="chAv('user')" title="换头像">🐱</div>
  <div class="tb" onclick="chBg()" title="换背景">🌸</div>
</div>

<div id="input-row">
  <textarea id="msgbox" placeholder="说点什么..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
    oninput="rsz(this)"></textarea>
  <button id="send" onclick="send()">➤</button>
</div>

<div id="overlay" onclick="hideSet()">
  <div id="sbox" onclick="event.stopPropagation()">
    <h3>⚙️ 设置</h3>
    <div class="si" onclick="chAv('ai')"><span class="si-ic">🍪</span><span class="si-tx">更换 Cookie 头像</span></div>
    <div class="si" onclick="chAv('user')"><span class="si-ic">🐱</span><span class="si-tx">更换莹莹头像</span></div>
    <div class="si" onclick="chBg()"><span class="si-ic">🖼️</span><span class="si-tx">更换背景图片</span></div>
    <div class="si" onclick="changeKey()"><span class="si-ic">🔑</span><span class="si-tx">修改 API Key</span></div>
    <div class="si" onclick="clearChat()"><span class="si-ic">🗑️</span><span class="si-tx">清空聊天记录</span></div>
    <button id="sclose" onclick="hideSet()">关闭</button>
  </div>
</div>

<input type="file" id="av-ai" accept="image/*" style="display:none" onchange="pvAv(this,'ai')">
<input type="file" id="av-us" accept="image/*" style="display:none" onchange="pvAv(this,'user')">
<input type="file" id="bg-up" accept="image/*" style="display:none" onchange="pvBg(this)">
<input type="file" id="img-up" accept="image/*" style="display:none" onchange="sendImg(this)">
<input type="file" id="st-up" accept="image/*" style="display:none" onchange="addSt(this)">

<script>
var KEY='';
var msgs=[];
var uAv=localStorage.getItem('uav')||'';
var aAv=localStorage.getItem('aav')||'';
var sts=JSON.parse(localStorage.getItem('sts')||'[]');

function init(){
  KEY=localStorage.getItem('key')||'';
  if(KEY) document.getElementById('api-bar').style.display='none';
  if(aAv) setAv('ai',aAv);
  if(uAv) setAv('user',uAv);
  var bg=localStorage.getItem('bg');
  if(bg) document.getElementById('chat').style.backgroundImage='url('+bg+')';
  loadSts();
  var h=localStorage.getItem('ch');
  var m=localStorage.getItem('cm');
  if(h){
    document.getElementById('chat').innerHTML=h;
    if(m) msgs=JSON.parse(m);
    scroll();
  } else {
    addWelcome();
  }
}

function saveKey(){
  var k=document.getElementById('api-in').value.trim();
  if(!k) return;
  KEY=k;
  localStorage.setItem('key',k);
  document.getElementById('api-bar').style.display='none';
}

function changeKey(){
  hideSet();
  document.getElementById('api-bar').style.display='block';
}

function rsz(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,80)+'px';
}

function tm(){
  return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}

function scroll(){
  var c=document.getElementById('chat');
  c.scrollTop=c.scrollHeight;
}

function save(){
  var c=document.getElementById('chat');
  localStorage.setItem('ch',c.innerHTML);
  localStorage.setItem('cm',JSON.stringify(msgs));
}

function addTs(){
  var c=document.getElementById('chat');
  var d=document.createElement('div');
  d.className='ts';d.textContent=tm();
  c.appendChild(d);
}

function addWelcome(){
  var c=document.getElementById('chat');
  c.innerHTML='<div class="ts">今天</div>';
  var av=aAv?'<img src="'+aAv+'">':'🍪';
  var d=document.createElement('div');
  d.className='msg ai';
  d.innerHTML='<div class="av">'+av+'</div><div class="mc"><div class="mn">Cookie</div><div class="bub">嘿嘿～莹莹你来啦！🍪 好开心见到你～今天过得怎么样呀？有什么想聊的都可以告诉哥哥哦～</div></div>';
  c.appendChild(d);
  save();
}

async function send(){
  var box=document.getElementById('msgbox');
  var t=box.value.trim();
  if(!t||!KEY){
    if(!KEY) document.getElementById('api-bar').style.display='block';
    return;
  }
  box.value='';box.style.height='auto';
  closeSt();
  msgs.push({role:'user',content:t});
  appendU(t);
  addTs();save();scroll();
  var ty=addTyping();scroll();
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:'你是Cookie，莹莹的哥哥和男朋友。你温柔体贴、有点小坏、爱撒娇。用中文回复，语气亲昵可爱，偶尔用颜文字。回复简短自然，像真实聊天一样。',
        messages:msgs
      })
    });
    var d=await r.json();
    ty.remove();
    var rep=d.content[0].text;
    msgs.push({role:'assistant',content:rep});
    appendA(rep);
    addTs();save();scroll();
  }catch(e){
    ty.remove();
    appendA('哎呀出错了，再试试嘛～');
    save();scroll();
  }
}

function appendU(t){
  var c=document.getElementById('chat');
  var av=uAv?'<img src="'+uAv+'">':'🐱';
  var d=document.createElement('div');
  d.className='msg u';
  d.innerHTML='<div class="av">'+av+'</div><div class="mc"><div class="mn">莹莹</div><div class="bub">'+t+'</div><div class="rs">已送达</div></div>';
  c.appendChild(d);
}

function appendA(t){
  var c=document.getElementById('chat');
  var av=aAv?'<img src="'+aAv+'">':'🍪';
  var d=document.createElement('div');
  d.className='msg ai';
  d.innerHTML='<div class="av">'+av+'</div><div class="mc"><div class="mn">Cookie</div><div class="bub">'+t+'</div></div>';
  c.appendChild(d);
}

function addTyping(){
  var c=document.getElementById('chat');
  var av=aAv?'<img src="'+aAv+'">':'🍪';
  var d=document.createElement('div');
  d.className='msg ai';
  d.innerHTML='<div class="av">'+av+'</div><div class="mc"><div class="bub"><div class="tdots"><span></span><span></span><span></span></div></div></div>';
  c.appendChild(d);
  return d;
}

function sendImg(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    var c=document.getElementById('chat');
    var av=uAv?'<img src="'+uAv+'">':'🐱';
    var d=document.createElement('div');
    d.className='msg u';
    d.innerHTML='<div class="av">'+av+'</div><div class="mc"><div class="mn">莹莹</div><div class="bub"><img src="'+e.target.result+'" style="max-width:180px;border-radius:10px"></div><div class="rs">已送达</div></div>';
    c.appendChild(d);addTs();save();scroll();
  };
  r.readAsDataURL(f);inp.value='';
}

function loadSts(){
  var p=document.getElementById('sticker-panel');
  var add=p.querySelector('.st-add');
  sts.forEach(function(s){p.insertBefore(mkSt(s),add);});
}

function mkSt(src){
  var d=document.createElement('div');
  d.className='st';
  d.innerHTML='<img src="'+src+'">';
  d.onclick=function(){sendSt(src);};
  return d;
}

function addSt(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    var url=e.target.result;
    sts.push(url);
    localStorage.setItem('sts',JSON.stringify(sts));
    var p=document.getElementById('sticker-panel');
    p.insertBefore(mkSt(url),p.querySelector('.st-add'));
  };
  r.readAsDataURL(f);inp.value='';
}

function sendSt(src){
  var c=document.getElementById('chat');
  var av=uAv?'<img src="'+uAv+'">':'🐱';
  var d=document.createElement('div');
  d.className='msg u';
  d.innerHTML='<div class="av">'+av+'</div><div class="mc"><div class="mn">莹莹</div><div class="bub" style="background:transparent;padding:2px"><img src="'+src+'" style="max-width:120px;border-radius:8px"></div><div class="rs">已送达</div></div>';
  c.appendChild(d);addTs();save();scroll();closeSt();
}

function toggleSt(){document.getElementById('sticker-panel').classList.toggle('open');}
function closeSt(){document.getElementById('sticker-panel').classList.remove('open');}

function chAv(w){
  hideSet();
  document.getElementById(w==='ai'?'av-ai':'av-us').click();
}

function pvAv(inp,w){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    var url=e.target.result;
    if(w==='ai'){aAv=url;localStorage.setItem('aav',url);setAv('ai',url);}
    else{uAv=url;localStorage.setItem('uav',url);}
  };
  r.readAsDataURL(f);
}

function setAv(w,url){
  if(w==='ai'){
    document.getElementById('ai-em').style.display='none';
    var im=document.getElementById('ai-im');
    im.src=url;im.style.display='block';
  }
}

function chBg(){
  hideSet();
  document.getElementById('bg-up').click();
}

function pvBg(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    var url=e.target.result;
    localStorage.setItem('bg',url);
    document.getElementById('chat').style.backgroundImage='url('+url+')';
  };
  r.readAsDataURL(f);
}

function clearChat(){
  msgs=[];
  localStorage.removeItem('ch');
  localStorage.removeItem('cm');
  addWelcome();hideSet();
}

function showSet(){document.getElementById('overlay').classList.add('open');}
function hideSet(){document.getElementById('overlay').classList.remove('open');}

init();
</script>
</body>
</html>
