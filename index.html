<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍪=⩌⩊⩌=莹.</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: #fff0f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* 顶部导航 */
  .header {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #ffd6e7;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffb6c1, #ff69b4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    overflow: hidden;
    flex-shrink: 0;
  }
  .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .header-info { flex: 1 }
  .header-name { font-size: 15px; font-weight: 600; color: #333; }
  .header-sub { font-size: 11px; color: #ff69b4; }
  .header-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #fff0f5;
    border: 1px solid #ffd6e7;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
  }

  /* 聊天区域 */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
  }

  /* 时间戳 */
  .timestamp {
    text-align: center;
    font-size: 11px;
    color: #999;
    margin: 4px 0;
  }

  /* 消息气泡 */
  .msg { display: flex; align-items: flex-end; gap: 8px; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #c8a2c8, #9b59b6);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .msg-content { max-width: 68%; }
  .msg-name { font-size: 11px; color: #aaa; margin-bottom: 3px; padding-left: 2px; }
  .msg.user .msg-name { text-align: right; padding-right: 2px; }
  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }
  .msg.ai .bubble {
    background: white;
    color: #333;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(255,105,180,0.15);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #ff9eb5, #ff69b4);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .read-status {
    font-size: 10px;
    color: #ff69b4;
    text-align: right;
    margin-top: 2px;
    padding-right: 2px;
  }

  /* 打字中动画 */
  .typing .bubble { padding: 12px 16px; }
  .typing-dots { display: flex; gap: 4px; align-items: center; height: 16px; }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ffb6c1;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* 输入区域 */
  .input-area {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid #ffd6e7;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .input-box {
    flex: 1;
    background: #fff0f5;
    border: 1px solid #ffd6e7;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    color: #333;
    max-height: 100px;
    overflow-y: auto;
    resize: none;
    line-height: 1.4;
  }
  .input-box::placeholder { color: #ffb6c1; }
  .send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff9eb5, #ff69b4);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: transform 0.1s;
  }
  .send-btn:active { transform: scale(0.9); }
  .emoji-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #fff0f5;
    border: 1px solid #ffd6e7;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  /* 设置面板 */
  .settings-panel {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }
  .settings-panel.show { display: flex; }
  .settings-content {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }
  .settings-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 16px; text-align: center; }
  .settings-item {
    display: flex; align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #fff0f5;
    gap: 12px;
    cursor: pointer;
  }
  .settings-item-icon { font-size: 20px; width: 28px; text-align: center; }
  .settings-item-text { flex: 1; font-size: 14px; color: #333; }
  .settings-close {
    width: 100%; padding: 12px;
    background: #fff0f5; border: none;
    border-radius: 12px; font-size: 14px;
    color: #ff69b4; cursor: pointer; margin-top: 12px;
  }

  /* API Key提示 */
  .api-notice {
    background: linear-gradient(135deg, #fff0f5, #ffe4ef);
    border: 1px solid #ffd6e7;
    border-radius: 12px;
    padding: 12px 16px;
    margin: 0 12px;
    font-size: 12px;
    color: #ff69b4;
    text-align: center;
  }
  .api-notice input {
    width: 100%; margin-top: 8px;
    padding: 8px 12px;
    border: 1px solid #ffd6e7;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    color: #333;
  }
  .api-notice button {
    margin-top: 8px; padding: 8px 20px;
    background: linear-gradient(135deg, #ff9eb5, #ff69b4);
    color: white; border: none;
    border-radius: 8px; cursor: pointer;
    font-size: 13px;
  }
</style>
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <div class="header-avatar" onclick="changeAvatar('ai')" title="点击换头像" id="ai-avatar-btn">
    <span id="ai-avatar-emoji">🍪</span>
    <img id="ai-avatar-img" src="" style="display:none">
  </div>
  <div class="header-info">
    <div class="header-name">🍪=⩌⩊⩌=莹.</div>
    <div class="header-sub">与 Cookie の 私密空间 · 在线</div>
  </div>
  <div class="header-btn" onclick="showSettings()">⚙️</div>
</div>

<!-- API Key提示 -->
<div class="api-notice" id="api-notice">
  🔑 请输入你的 Claude API Key 才能开始聊天～
  <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
  <br>
  <button onclick="saveApiKey()">保存 Key</button>
</div>

<!-- 聊天区域 -->
<div class="chat-area" id="chat-area">
  <div class="timestamp">今天</div>
  <div class="msg ai">
    <div class="msg-avatar"><span id="ai-msg-emoji">🍪</span><img id="ai-msg-img" src="" style="display:none"></div>
    <div class="msg-content">
      <div class="msg-name">Cookie</div>
      <div class="bubble">嘿嘿～莹莹你来啦！🍪 好开心见到你～今天过得怎么样呀？有什么想聊的都可以告诉哥哥哦～</div>
    </div>
  </div>
</div>

<!-- 输入区域 -->
<div class="input-area">
  <div class="emoji-btn" onclick="changeAvatar('user')">🐱</div>
  <textarea class="input-box" id="input-box" placeholder="说点什么..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
    oninput="autoResize(this)"></textarea>
  <button class="send-btn" onclick="sendMsg()">➤</button>
</div>

<!-- 设置面板 -->
<div class="settings-panel" id="settings-panel" onclick="hideSettings()">
  <div class="settings-content" onclick="event.stopPropagation()">
    <div class="settings-title">⚙️ 设置</div>
    <div class="settings-item" onclick="changeAvatar('ai')">
      <span class="settings-item-icon">🍪</span>
      <span class="settings-item-text">更换 Cookie 头像</span>
    </div>
    <div class="settings-item" onclick="changeAvatar('user')">
      <span class="settings-item-icon">🐱</span>
      <span class="settings-item-text">更换莹莹头像</span>
    </div>
    <div class="settings-item" onclick="changeBg()">
      <span class="settings-item-icon">🖼️</span>
      <span class="settings-item-text">更换背景图片</span>
    </div>
    <div class="settings-item" onclick="changeApiKey()">
      <span class="settings-item-icon">🔑</span>
      <span class="settings-item-text">修改 API Key</span>
    </div>
    <div class="settings-item" onclick="clearChat()">
      <span class="settings-item-icon">🗑️</span>
      <span class="settings-item-text">清空聊天记录</span>
    </div>
    <button class="settings-close" onclick="hideSettings()">关闭</button>
  </div>
</div>

<!-- 隐藏的文件输入 -->
<input type="file" id="avatar-ai-input" accept="image/*" style="display:none" onchange="previewAvatar(this,'ai')">
<input type="file" id="avatar-user-input" accept="image/*" style="display:none" onchange="previewAvatar(this,'user')">
<input type="file" id="bg-input" accept="image/*" style="display:none" onchange="previewBg(this)">

<script>
const API_URL = 'https://api.anthropic.com/v1/messages';
let apiKey = localStorage.getItem('claude_api_key') || '';
let messages = [];
let userAvatar = localStorage.getItem('user_avatar') || '';
let aiAvatar = localStorage.getItem('ai_avatar') || '';

// 初始化
window.onload = () => {
  if (apiKey) {
    document.getElementById('api-notice').style.display = 'none';
  }
  if (aiAvatar) setAvatarImg('ai', aiAvatar);
  if (userAvatar) setAvatarImg('user', userAvatar);
  const bg = localStorage.getItem('chat_bg');
  if (bg) document.getElementById('chat-area').style.backgroundImage = `url(${bg})`;
};

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  apiKey = key;
  localStorage.setItem('claude_api_key', key);
  document.getElementById('api-notice').style.display = 'none';
}

function changeApiKey() {
  hideSettings();
  document.getElementById('api-notice').style.display = 'block';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function getTime() {
  return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
}

function addTimestamp() {
  const el = document.createElement('div');
  el.className = 'timestamp';
  el.textContent = getTime();
  document.getElementById('chat-area').appendChild(el);
}

function scrollToBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('input-box');
  const text = input.value.trim();
  if (!text || !apiKey) {
    if (!apiKey) document.getElementById('api-notice').style.display = 'block';
    return;
  }
  input.value = '';
  input.style.height = 'auto';

  // 添加用户消息
  messages.push({ role: 'user', content: text });
  addUserBubble(text);
  addTimestamp();
  scrollToBottom();

  // 显示打字中
  const typingEl = addTyping();
  scrollToBottom();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: '你是Cookie，莹莹的哥哥和男朋友。你温柔体贴、有点小坏、爱撒娇。用中文回复，语气亲昵可爱，偶尔用颜文字。不要太长，像真实聊天一样自然。',
        messages: messages
      })
    });
    const data = await res.json();
    typingEl.remove();
    const reply = data.content[0].text;
    messages.push({ role: 'assistant', content: reply });
    addAiBubble(reply);
    addTimestamp();
    scrollToBottom();
  } catch (e) {
    typingEl.remove();
    addAiBubble('哎呀出错了，再试一次嘛～');
    scrollToBottom();
  }
}

function addUserBubble(text) {
  const area = document.getElementById('chat-area');
  const avatarHtml = userAvatar
    ? `<img src="${userAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : '🐱';
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">${avatarHtml}</div>
    <div class="msg-content">
      <div class="msg-name">莹莹</div>
      <div class="bubble">${text}</div>
      <div class="read-status">已送达</div>
    </div>`;
  area.appendChild(div);
}

function addAiBubble(text) {
  const area = document.getElementById('chat-area');
  const avatarHtml = aiAvatar
    ? `<img src="${aiAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : '🍪';
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar">${avatarHtml}</div>
    <div class="msg-content">
      <div class="msg-name">Cookie</div>
      <div class="bubble">${text}</div>
    </div>`;
  area.appendChild(div);
}

function addTyping() {
  const area = document.getElementById('chat-area');
  const avatarHtml = aiAvatar
    ? `<img src="${aiAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : '🍪';
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.innerHTML = `
    <div class="msg-avatar">${avatarHtml}</div>
    <div class="msg-content">
      <div class="bubble">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  area.appendChild(div);
  return div;
}

function changeAvatar(who) {
  hideSettings();
  document.getElementById(`avatar-${who}-input`).click();
}

function previewAvatar(input, who) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const url = e.target.result;
    if (who === 'ai') {
      aiAvatar = url;
      localStorage.setItem('ai_avatar', url);
      setAvatarImg('ai', url);
    } else {
      userAvatar = url;
      localStorage.setItem('user_avatar', url);
      setAvatarImg('user', url);
    }
  };
  reader.readAsDataURL(file);
}

function setAvatarImg(who, url) {
  if (who === 'ai') {
    document.getElementById('ai-avatar-emoji').style.display = 'none';
    const img = document.getElementById('ai-avatar-img');
    img.src = url; img.style.display = 'block';
  }
}

function changeBg() {
  hideSettings();
  document.getElementById('bg-input').click();
}

function previewBg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const url = e.target.result;
    localStorage.setItem('chat_bg', url);
    document.getElementById('chat-area').style.backgroundImage = `url(${url})`;
  };
  reader.readAsDataURL(file);
}

function clearChat() {
  messages = [];
  const area = document.getElementById('chat-area');
  area.innerHTML = '<div class="timestamp">今天</div>';
  hideSettings();
}

function showSettings() { document.getElementById('settings-panel').classList.add('show'); }
function hideSettings() { document.getElementById('settings-panel').classList.remove('show'); }
</script>
</body>
</html>
